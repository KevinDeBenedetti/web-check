name: Security Scan

on:
  push:
    branches: [main, feat/new-arch]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  security-events: write
  contents: read

jobs:
  web-scan:
    name: Web Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run web checks
        continue-on-error: true
        run: |
          uv run my-check web "${{ vars.SCAN_TARGET_URL || 'https://example.com' }}" \
            --output terminal,json
        env:
          MY_CHECK_SARIF: "true"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: outputs/my-check-results.sarif
        continue-on-error: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-check-results
          path: outputs/my-check-results.*

  k8s-scan:
    name: K8s Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: my-check-test

      - name: Run k8s checks
        continue-on-error: true
        run: |
          uv run my-check k8s \
            --context kind-my-check-test \
            --output terminal,json

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: outputs/my-check-results.sarif
        continue-on-error: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k8s-check-results
          path: outputs/my-check-results.*
