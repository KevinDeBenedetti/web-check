name: CD

on:
  push:
    branches:
      - main
  pull_request_target:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. Release Please
  release:
    name: Release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/release.yml@main
    secrets: inherit

  # 2. Build & push API Docker image (on release)
  deploy-api:
    name: Deploy API
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/cd-docker.yml@main
    with:
      image-name: web-check-api
      context: "."
      dockerfile: Dockerfile
      tag-latest: true
      version: ${{ needs.release.outputs.tag }}
    secrets: inherit

  # 3. Build & push Web Docker image (on release)
  deploy-web:
    name: Deploy Web
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/cd-docker.yml@main
    with:
      image-name: web-check-web
      context: "./apps/web"
      dockerfile: Dockerfile
      tag-latest: true
      version: ${{ needs.release.outputs.tag }}
    secrets: inherit

  # 4. Sync docs → kevindebenedetti.github.io
  deploy-docs:
    name: Sync docs → central repo
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/cd-docs.yml@main
    secrets: inherit

  # 5. Bot commit guard on PRs
  bot-check:
    name: Check bot commits
    if: github.event_name == 'pull_request_target'
    uses: KevinDeBenedetti/github-workflows/.github/workflows/check-bot-commits.yml@main
    with:
      allowed-bots: '["dependabot[bot]"]'
