
name: CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - "**"
      - "!release/**"

jobs:
  # 1. Python CI — lint, format, typecheck, test
  python:
    name: Python CI
    uses: KevinDeBenedetti/github-workflows/.github/workflows/ci-python.yml@main
    with:
      python-version: "3.12"
      working-directory: "."
      run-lint: true
      run-format: true
      run-typecheck: true
      run-test: true
      run-coverage: false

  # 2. React CI — lint, typecheck, build
  react:
    name: React CI
    uses: KevinDeBenedetti/github-workflows/.github/workflows/ci-node.yml@main
    with:
      working-directory: "./apps/web"
      package-manager: bun
      run-lint: true
      run-typecheck: true
      run-test: false
      run-build: true

  # 3. Security — secret scan + audits
  security:
    name: Security
    uses: KevinDeBenedetti/github-workflows/.github/workflows/security.yml@main
    with:
      run-node-audit: true
      node-working-directory: "./apps/web"
      run-python-audit: true
      python-working-directory: "."
      run-secret-scan: true
      run-codeql: false
    permissions:
      security-events: write
      actions: read
      contents: read
      pull-requests: read

  # 4. Bot commit guard
  bot-check:
    name: Bot check
    uses: KevinDeBenedetti/github-workflows/.github/workflows/check-bot-commits.yml@main
    with:
      allowed-bots: '["dependabot[bot]"]'
    permissions:
      contents: read
      pull-requests: read

  # 5. Gate — all required checks passed
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs:
      - python
      - react
    steps:
      - name: All checks passed
        run: echo "✅ All CI checks passed successfully!"
